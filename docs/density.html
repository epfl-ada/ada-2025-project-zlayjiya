<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouNiverse | Global Connectivity Decay</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* DARK MODE CSS */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: transparent; 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        
        #chart-container { 
            background: transparent; 
            border: none; 
            border-radius:none; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            width: 100%; 
            height: 100%; 
            padding: 20px; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>

<script>
    // --- DATA INJECTED FROM PYTHON ---
    const years = [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019];
    const densities = [0.049970125322381806, 0.025531100073525135, 0.016566743981024746, 0.010807651490938885, 0.008324191306766293, 0.006400679752512793, 0.004464626028818854, 0.0031083482918906917, 0.0024102822964907097, 0.00245598741645739];
    // const dropPercent = 95.1; // Not used in chart anymore

    // Trace Configuration
    const trace = {
        x: years,
        y: densities,
        mode: 'lines+markers',
        name: 'Network Density',
        // Cyan/Blue color to pop against the dark background
        line: { color: '#00d2ff', width: 4, shape: 'spline' }, 
        marker: { 
            size: 10, 
            color: '#00d2ff', 
            line: { color: '#ffffff', width: 2 } 
        },
        fill: 'tozeroy',
        fillcolor: 'rgba(0, 210, 255, 0.1)', // Subtle glowing effect
        type: 'scatter',
        hovertemplate: '<b>Year %{x}</b><br>Density: %{y:.6f}<extra></extra>'
    };

    const layout = {
        title: { 
            text: 'Decline of Global Connectivity (2010-2019)', 
            font: { family: 'Inter', size: 24, weight: 900, color: '#ffffff' } 
        },
        font: {
            family: 'Inter',
            color: '#e0e0e0'
        },
        xaxis: { 
            title: 'Year', 
            gridcolor: '#444444', 
            zeroline: false, 
            tickmode: 'linear',
            tickcolor: '#e0e0e0'
        },
        yaxis: { 
            title: 'Structural Density', 
            gridcolor: '#444444', 
            zeroline: false, 
            tickformat: '.4f',
            tickcolor: '#e0e0e0'
        },
        margin: { l: 80, r: 50, t: 100, b: 80 },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        
        // Annotations removed
        annotations: []
    };

    Plotly.newPlot('chart-container', [trace], layout, {responsive: true});
</script>
</body>
</html>
