<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0d1117; font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .tab-container { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #0d1117; }
        .tab-btn {
            background: rgba(40, 40, 60, 0.8);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 10px 20px;
            color: #e2e2ed;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.9em;
        }
        .tab-btn:hover { border-color: rgba(139, 92, 246, 0.7); background: rgba(139, 92, 246, 0.2); }
        .tab-btn.active { background: rgba(139, 92, 246, 0.4); border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .chart-container { display: none; }
        .chart-container.active { display: block; }
    </style>
</head>
<body>
<div class="tab-container">
    <button class="tab-btn active" data-chart="engagement">⚡ Engagement Rate</button>
    <button class="tab-btn" data-chart="duration">⏱️ Video Duration</button>
    <button class="tab-btn" data-chart="views">👁️ Total Views</button>
</div>

<div id="engagement" class="chart-container active" style="width:100%;height:480px;"></div>
<div id="duration" class="chart-container" style="width:100%;height:480px;"></div>
<div id="views" class="chart-container" style="width:100%;height:480px;"></div>

<script>
const bg_color = "#0d1117";
const font_stack = "'-apple-system', 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

const galaxies = [
    {name: "💄 Lifestyle", engagement: 27.1, duration: 11.5, views: 219.7, color: "#f59e0b"},
    {name: "🎯 Gaming (Comp)", engagement: 19.0, duration: 15.8, views: 205.3, color: "#06b6d4"},
    {name: "📰 News & Wellness", engagement: 18.5, duration: 18.4, views: 63.4, color: "#10b981"},
    {name: "🚗 Automotive", engagement: 17.2, duration: 13.5, views: 31.4, color: "#6366f1"},
    {name: "🎮 Gaming (Sandbox)", engagement: 17.1, duration: 16.0, views: 306.5, color: "#3b82f6"},
    {name: "🏀 Hip-Hop & Sports", engagement: 15.3, duration: 10.8, views: 119.1, color: "#ef4444"},
    {name: "🇵🇭 Asian Content", engagement: 15.3, duration: 14.5, views: 38.6, color: "#a855f7"},
    {name: "🇮🇳 Indian Entertainment", engagement: 13.3, duration: 12.5, views: 296.4, color: "#8b5cf6"},
    {name: "🎵 Mainstream Music", engagement: 8.0, duration: 8.0, views: 1227.5, color: "#ec4899"},
    {name: "✨ Viral & ASMR", engagement: 4.1, duration: 16.2, views: 200.3, color: "#14b8a6"}
];

const baseLayout = {
    paper_bgcolor: bg_color,
    plot_bgcolor: bg_color,
    font: { family: font_stack, size: 12, color: "#FFFFFF" },
    margin: { l: 60, r: 30, t: 50, b: 100 },
    bargap: 0.25,
    showlegend: false,
    hoverlabel: { bgcolor: "#111111", font_size: 13, font_family: font_stack, font_color: "#FFFFFF", bordercolor: "#06b6d4" }
};

// Engagement Chart
Plotly.newPlot('engagement', [{
    x: galaxies.map(g => g.name),
    y: galaxies.map(g => g.engagement),
    type: 'bar',
    marker: { color: galaxies.map(g => g.color), line: { color: '#FFFFFF', width: 1 } },
    text: galaxies.map(g => g.engagement.toFixed(1)),
    textposition: 'outside',
    textfont: { color: '#FFFFFF', size: 11 },
    hovertemplate: '<b>%{x}</b><br>Engagement: %{y:.1f} likes/1000 views<extra></extra>'
}], {
    ...baseLayout,
    title: { text: "<b>ENGAGEMENT RATE</b> (likes per 1000 views)", x: 0.5, font: { size: 16, color: "#8b5cf6" } },
    xaxis: { tickangle: -35, tickfont: { size: 10, color: '#AAAAAA' }, showgrid: false },
    yaxis: { title: "Likes / 1000 Views", gridcolor: 'rgba(255,255,255,0.05)', range: [0, 32] },
    annotations: [
        { x: "💄 Lifestyle", y: 27.1, text: "🔥 Most Engaged", showarrow: true, arrowhead: 2, arrowcolor: "#f59e0b", font: { color: "#f59e0b", size: 10 }, ax: 40, ay: -30 }
    ]
}, {responsive: true, displayModeBar: false});

// Duration Chart  
Plotly.newPlot('duration', [{
    x: galaxies.map(g => g.name),
    y: galaxies.map(g => g.duration),
    type: 'bar',
    marker: { color: galaxies.map(g => g.color), line: { color: '#FFFFFF', width: 1 } },
    text: galaxies.map(g => g.duration.toFixed(1) + " min"),
    textposition: 'outside',
    textfont: { color: '#FFFFFF', size: 11 },
    hovertemplate: '<b>%{x}</b><br>Avg Duration: %{y:.1f} minutes<extra></extra>'
}], {
    ...baseLayout,
    title: { text: "<b>AVERAGE VIDEO DURATION</b> (minutes)", x: 0.5, font: { size: 16, color: "#06b6d4" } },
    xaxis: { tickangle: -35, tickfont: { size: 10, color: '#AAAAAA' }, showgrid: false },
    yaxis: { title: "Minutes", gridcolor: 'rgba(255,255,255,0.05)', range: [0, 22] },
    annotations: [
        { x: "📰 News & Wellness", y: 18.4, text: "📺 Longest", showarrow: true, arrowhead: 2, arrowcolor: "#10b981", font: { color: "#10b981", size: 10 }, ax: 40, ay: -30 },
        { x: "🎵 Mainstream Music", y: 8.0, text: "🎵 Shortest", showarrow: true, arrowhead: 2, arrowcolor: "#ec4899", font: { color: "#ec4899", size: 10 }, ax: -40, ay: -40 }
    ]
}, {responsive: true, displayModeBar: false});

// Views Chart (Billions)
Plotly.newPlot('views', [{
    x: galaxies.map(g => g.name),
    y: galaxies.map(g => g.views),
    type: 'bar',
    marker: { color: galaxies.map(g => g.color), line: { color: '#FFFFFF', width: 1 } },
    text: galaxies.map(g => g.views.toFixed(0) + "B"),
    textposition: 'outside',
    textfont: { color: '#FFFFFF', size: 11 },
    hovertemplate: '<b>%{x}</b><br>Total Views: %{y:.1f} Billion<extra></extra>'
}], {
    ...baseLayout,
    title: { text: "<b>TOTAL VIEWS</b> (Billions)", x: 0.5, font: { size: 16, color: "#ec4899" } },
    xaxis: { tickangle: -35, tickfont: { size: 10, color: '#AAAAAA' }, showgrid: false },
    yaxis: { title: "Billion Views", gridcolor: 'rgba(255,255,255,0.05)' },
    annotations: [
        { x: "🎵 Mainstream Music", y: 1227.5, text: "🌟 1.2 Trillion!", showarrow: true, arrowhead: 2, arrowcolor: "#ec4899", font: { color: "#ec4899", size: 10 }, ax: -50, ay: -30 }
    ]
}, {responsive: true, displayModeBar: false});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.dataset.chart).classList.add('active');
        Plotly.Plots.resize(document.getElementById(this.dataset.chart));
    });
});
</script>
</body>
</html>
