<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Plotly for interactive visualizations -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <!-- Stars background -->
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">🌌</span>
            <span class="brand-text">YouNiverse</span>
        </div>
        <ul class="nav-links">
            <li><a href="#introduction">Introduction</a></li>
            <li><a href="#dataset">Dataset</a></li>
            <li><a href="#galaxies">Galaxies</a></li>
            <li><a href="#identity">Identity</a></li>
            <li><a href="#navigation">Navigation</a></li>
            <li><a href="#blackholes">Black Holes</a></li>
        </ul>
    </nav>
    
    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">{{ site.title }}</h1>
            <p class="hero-subtitle">{{ site.description }}</p>
            <div class="scroll-indicator">
                <span>Scroll to explore</span>
                <div class="arrow"></div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="content">
        {{ content }}
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>A Data Story by the ADA Team</p>
            <p class="team">{{ site.authors | join: " • " }}</p>
            <p class="credits">EPFL - Applied Data Analysis 2025</p>
        </div>
    </footer>
    
    <!-- Custom JS -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
