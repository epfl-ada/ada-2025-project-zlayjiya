<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Top 5 Communities | YouNiverse</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* DARK MODE CSS */
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: transparent; /* Pure Black Background */
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        
        #chart-container { 
            background: transparent; /* Very dark grey card */
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            height: 100%; 
            padding: 20px; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

<script>
    // --- DATA INJECTED FROM PYTHON ---
    const years = [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019];
    const ranks = {"rank1": {"sizes": [516, 681, 851, 902, 1066, 955, 902, 1067, 1087, 1261], "labels": ["Music (EminemVEVO)", "Gaming (Nice Peter)", "Gaming (PewDiePie)", "Entertainment (WatchMojo.com)", "Gaming (PewDiePie)", "Gaming (Markiplier)", "Gaming (DanTDM)", "Entertainment (Technical Guruji)", "Entertainment (Technical Guruji)", "Gaming (PewDiePie)"]}, "rank2": {"sizes": [487, 530, 708, 711, 769, 896, 814, 943, 870, 722], "labels": ["Gaming (Annoying Orange)", "Music (JennaMarbles)", "Music (JennaMarbles)", "Gaming (PewDiePie)", "Music (Spinnin' Records)", "Gaming (WatchMojo.com)", "Entertainment (shane)", "Gaming (PopularMMOs)", "Gaming (Jake Paul)", "Entertainment (jeffreestar)"]}, "rank3": {"sizes": [293, 433, 492, 573, 679, 772, 782, 743, 775, 721], "labels": ["Music (nigahiga)", "Entertainment (Movieclips)", "Entertainment (VICE)", "Music (OneDirectionVEVO)", "Gaming (WatchMojo.com)", "Howto & Style (BuzzFeedVideo)", "Gaming (PewDiePie)", "Gaming (PewDiePie)", "Gaming (PewDiePie)", "Entertainment (T-Series)"]}, "rank4": {"sizes": [278, 232, 288, 446, 630, 726, 594, 553, 722, 547], "labels": ["Howto & Style (RT)", "Howto & Style (Bethany Mota)", "Howto & Style (Bethany Mota)", "Howto & Style (Bethany Mota)", "Howto & Style (Bethany Mota)", "Music (WORLDSTARHIPHOP)", "Entertainment (T-Series)", "Music (The ACE Family)", "Howto & Style (The ACE Family)", "Gaming (Infinite)"]}, "rank5": {"sizes": [164, 199, 240, 255, 350, 386, 562, 521, 596, 455], "labels": ["Autos & Vehicles (Top Gear)", "Music (Wiz Khalifa)", "Gaming (WhiteBoy7thst)", "Music (djvlad)", "News & Politics (The Young Turks)", "Music (T-Series)", "Music (The Young Turks)", "Entertainment (Jake Paul)", "Music (WORLDSTARHIPHOP)", "Entertainment (ESPN)"]}};

    // Colors for Rank 1 to Rank 5
    const colors = ['#e41a1c', '#377eb8', '#4daf4a', '#984ea3', '#ff7f00'];
    const rankLabels = ['#1 Largest', '#2 Largest', '#3 Largest', '#4 Largest', '#5 Largest'];

    // Construct Traces
    const traces = Object.keys(ranks).map((key, index) => {
        return {
            x: years,
            y: ranks[key].sizes,
            name: rankLabels[index],
            text: ranks[key].labels, // This contains "Category (Creator)"
            hovertemplate: '<b>Rank ' + (index+1) + '</b><br>%{text}<br>Size: %{y} channels<extra></extra>',
            type: 'bar',
            marker: { color: colors[index], opacity: 0.9 }
        };
    });

    const layout = {
        title: { 
            text: 'Evolution of Top 5 Community Identities', 
            font: { family: 'Inter', size: 22, weight: 900, color: '#ffffff' } 
        },
        font: {
            family: 'Inter',
            color: '#e0e0e0'
        },
        barmode: 'group', // Bars side by side
        xaxis: { 
            title: 'Year', 
            gridcolor: '#444444', 
            zeroline: false,
            tickcolor: '#e0e0e0'
        },
        yaxis: { 
            title: 'Community Size (# of channels)', 
            gridcolor: '#444444', 
            zeroline: false,
            tickcolor: '#e0e0e0'
        },
        legend: { 
            x: 0.01, 
            y: 0.99, 
            bgcolor: 'rgba(0, 0, 0, 0.5)', 
            font: { color: '#e0e0e0' }
        },
        margin: { l: 80, r: 50, t: 100, b: 80 },
        hovermode: 'x unified',
        paper_bgcolor: 'rgba(0,0,0,0)', 
        plot_bgcolor: 'rgba(0,0,0,0)'
    };

    Plotly.newPlot('chart-container', traces, layout, {responsive: true});
</script>
</body>
</html>
